services:
  - type: web
    name: ecoloop
    runtime: node
    plan: free
    buildCommand: cd server && npm ci && cd ../frontend && npm ci && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_ORIGIN
        value: ""

